test_data:
  test_extract_stats:
    default:
      input:
        monitor_resolution: [1920, 1080]
    test_cases:
      - input: { full_image: "echo_0001_full.png" }
        expected:
          tuneLevel: 5
          stats:
            main: { 'cd%': 44.0, 'atk': 150, }
            sub: {'atk%': 10.9, 'cd%': 13.8, 'hp': 360, 'cr%': 6.9, 'hp%': 7.1, }
      - input: { full_image: "echo_0002_full.png" }
        expected:
          tuneLevel: 5
          stats:
            main: { 'atk%': 46.6, }
            sub: {'atk%': 10.9, 'cd%': 13.8, 'hp': 360, 'cr%': 6.9, 'hp%': 7.1, }

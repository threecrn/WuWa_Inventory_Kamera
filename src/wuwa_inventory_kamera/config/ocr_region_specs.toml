# OCR Region Specs - preprocessing & cache-signature configuration
#
# Each section defines an OcrRegionSpec by its ROI key path.
# Colour ranges use [[lo, lo, lo], [hi, hi, hi]] notation.
# Exact mode: lo == hi, e.g. [[166, 235, 247], [166, 235, 247]].
# OCR resize bounds use [width, height].
# pre_upscale/post_upscale enforce minimum size; pre_downscale/post_downscale cap maximum size.

spec_version = "3.3-new-ui-v2"

# =====================================================================
# Echo workflow
# =====================================================================

[echoes.echoName.ocr]
color_space = "hsv"
single_line = true
#post_upscale = [1024, 64]

[echoes.echoName.ocr.rarity_overrides."5"]
text_color_ranges = [[[20, 60, 150], [32, 255, 255]]]
[echoes.echoName.ocr.rarity_overrides."4"]
text_color_ranges = [[[135, 60, 150], [150, 255, 255]]]
[echoes.echoName.ocr.rarity_overrides."3"]
text_color_ranges = [[[112, 60, 150], [125, 255, 255]]]
[echoes.echoName.ocr.rarity_overrides."2"]
text_color_ranges = [[[55, 60, 150], [70, 255, 255]]]

# Exact-match signature recipe for cache keying.
[echoes.echoName.signature]
cache_mode = "persistent"
color_space = "bgr"
pre_downscale = [512, 32]

[echoes.echoName.signature.rarity_overrides."5"]
text_color_ranges = [
    [[166, 235, 247], [166, 235, 247]],
]

[echoes.echoName.signature.rarity_overrides."4"]
text_color_ranges = [
    [[185, 135, 200], [185, 135, 200]],
]

[echoes.echoName.signature.rarity_overrides."3"]
text_color_ranges = [
    [[220, 180, 120], [220, 180, 120]],
]

[echoes.echoName.signature.rarity_overrides."2"]
text_color_ranges = [
    [[130, 210, 140], [130, 210, 140]],
]

[echoes.fullStatsName.ocr]
render_mode = "luma_boost_color"
post_upscale = [512, 512]

[echoes.fullStatsName.signature]
cache_mode = "persistent"
color_space = "bgr"
#pre_downscale = [128,128]
text_color_ranges = [
    [[255, 255, 249], [255, 255, 249]],
]

[echoes.fullStatsValue.ocr]
render_mode = "luma_boost_color"
allowed_chars = "0123456789.%+"
post_upscale = [128, 512]

[echoes.fullStatsValue.signature]
cache_mode = "persistent"
color_space = "bgr"
#pre_downscale = [64, 128]
text_color_ranges = [
    [[255, 255, 249], [255, 255, 249]],
]

[echoes.level.ocr]
render_mode = "anchor_contrast"
anchor_contrast_sharpness = 12.0
color_space = "bgr"
text_color_ranges = [[[170, 160, 150], [195, 190, 175]]]
background_color_ranges = [[[40, 30, 20], [60, 50, 40]]]
#text_color_ranges = [[[150, 160, 170], [175, 190, 195]]]
#background_color_ranges = [[[20, 30, 40], [40, 50, 60]]]
single_line = true
post_upscale = [64, 64]

allowed_chars = "0123456789+"

[echoes.level.signature]
cache_mode = "transient"
color_space = "bgr"
# Signature colors are keyed against the shared BGR-normalized level crop
# used by both live capture and raw-session reprocess.
#pre_downscale = [32, 32]
text_color_ranges = [
#    [[197, 185, 173], [197, 185, 173]],    
#    [[189, 185, 169], [217, 205, 193]],
    [[185, 181, 165], [189, 185, 169]],
]

# =====================================================================
# Weapon workflow
# =====================================================================

[weapons.name]
color_space = "bgr"
cache_mode = "persistent"
# TODO: If weapon-name signatures should hash preprocessed text masks,
# define explicit preprocess overrides in [weapons.name.signature].

[weapons.name.rarity_overrides."5"]
text_color_ranges = [
    [[166, 235, 247], [166, 235, 247]],
]

[weapons.name.rarity_overrides."4"]
text_color_ranges = [
    [[185, 135, 200], [185, 135, 200]],
]

[weapons.name.rarity_overrides."3"]
text_color_ranges = [
    [[220, 180, 120], [220, 180, 120]],
]

[weapons.name.rarity_overrides."2"]
text_color_ranges = [
    [[130, 210, 140], [130, 210, 140]],
]

[weapons.value]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789"
cache_mode = "persistent"

[weapons.level]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789Lv./"
cache_mode = "persistent"

# =====================================================================
# Item workflow
# =====================================================================

[items.info]
color_space = "gray"
threshold_mode = "floor"
floor_value = 100
cache_mode = "persistent"

# =====================================================================
# Character workflow
# =====================================================================

[characters.resonatorName]
color_space = "hsv"
threshold_mode = "floor"
floor_value = 120
cache_mode = "persistent"
background_color_ranges = [
    [[98, 40, 30], [125, 255, 255]],
]

[characters.resonatorLevel]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789"
cache_mode = "persistent"

[characters.weaponName]
color_space = "bgr"
cache_mode = "persistent"
# TODO: If character weapon-name signatures should hash preprocessed text masks,
# define explicit preprocess overrides in [characters.weaponName.signature].

[characters.weaponName.rarity_overrides."5"]
text_color_ranges = [
    [[166, 235, 247], [166, 235, 247]],
]

[characters.weaponName.rarity_overrides."4"]
text_color_ranges = [
    [[185, 135, 200], [185, 135, 200]],
]

[characters.weaponName.rarity_overrides."3"]
text_color_ranges = [
    [[220, 180, 120], [220, 180, 120]],
]

[characters.weaponName.rarity_overrides."2"]
text_color_ranges = [
    [[130, 210, 140], [130, 210, 140]],
]

[characters.weaponLevel]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789"
cache_mode = "persistent"

[characters.weaponRank]
color_space = "bgr"
cache_mode = "persistent"
# TODO: If weapon-rank signatures should hash preprocessed text masks,
# define explicit preprocess overrides in [characters.weaponRank.signature].
text_color_ranges = [
    [[40, 200, 230], [60, 255, 255]],
]

[characters.skillLevel]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789"
cache_mode = "persistent"

# =====================================================================
# Navigation / Page counts
# =====================================================================

[nav.pageCount]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789/"
cache_mode = "none"

# =====================================================================
# Achievement workflow
# =====================================================================

[achievements.status]
color_space = "gray"
threshold_mode = "floor"
floor_value = 100
cache_mode = "none"

# =====================================================================
# Shell (currency) workflow
# =====================================================================

[shell.amount]
color_space = "gray"
threshold_mode = "floor"
floor_value = 150
allowed_chars = "0123456789"
cache_mode = "persistent"
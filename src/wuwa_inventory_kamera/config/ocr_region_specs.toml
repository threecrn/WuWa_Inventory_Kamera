# OCR Region Specs - preprocessing & cache-signature configuration
#
# Each section defines an OcrRegionSpec by its ROI key path.
# Colour ranges use [[lo, lo, lo], [hi, hi, hi]] notation.
# Exact mode: lo == hi, e.g. [[166, 235, 247], [166, 235, 247]].
# OCR resize bounds use [width, height].
# pre_upscale/post_upscale enforce minimum size; pre_downscale/post_downscale cap maximum size.

spec_version = "3.3-new-ui-v2"

# =====================================================================
# Echo workflow
# =====================================================================

[echoes.echoName.ocr]
color_space = "hsv"
single_line = true
pre_upscale = [512, 64]
render_mode = "masked_normalized_anchor_contrast"
anchor_contrast_sharpness = 6.0
#background_color_ranges = [[[80, 66, 50], [220, 215, 200]]]

[echoes.echoName.ocr.rarity_overrides."5"]
#text_color_ranges = [[[20, 60, 150], [32, 255, 255]]]
text_color_ranges = [[[25,70,200],[27,90,255]]]
[echoes.echoName.ocr.rarity_overrides."4"]
text_color_ranges = [[[135, 60, 150], [150, 255, 255]]]
[echoes.echoName.ocr.rarity_overrides."3"]
text_color_ranges = [[[112, 60, 150], [125, 255, 255]]]
[echoes.echoName.ocr.rarity_overrides."2"]
text_color_ranges = [[[55, 60, 150], [70, 255, 255]]]

# Exact-match signature recipe for cache keying.
[echoes.echoName.signature]
single_line = true
cache_mode = "persistent"
color_space = "bgr"
pre_downscale = [512, 32]

[echoes.echoName.signature.rarity_overrides."5"]
text_color_ranges = [
    [[166, 235, 247], [166, 235, 247]],
]

[echoes.echoName.signature.rarity_overrides."4"]
text_color_ranges = [
    [[185, 135, 200], [185, 135, 200]],
]

[echoes.echoName.signature.rarity_overrides."3"]
text_color_ranges = [
    [[220, 180, 120], [220, 180, 120]],
]

[echoes.echoName.signature.rarity_overrides."2"]
text_color_ranges = [
    [[130, 210, 140], [130, 210, 140]],
]

[echoes.fullStatsName.ocr]
#color_space = "rgb"
render_mode = "masked_normalized_anchor_contrast"
anchor_contrast_sharpness = 4.0
text_color_ranges = [[[230, 235, 235], [255, 255, 249]]]
#background_color_ranges = [[[80, 66, 50], [220, 215, 200]]]
post_upscale = [512, 512]

[echoes.fullStatsName.signature]
#spec_version = "3.3-new-ui-v2-stats-v2"
cache_mode = "persistent"
color_space = "bgr"
#pre_downscale = [128,128]
text_color_ranges = [
    [[255, 255, 249], [255, 255, 249]],
]

[echoes.fullStatsValue.ocr]
#color_space = "rgb"
render_mode = "masked_normalized_anchor_contrast"
anchor_contrast_sharpness = 4.0
text_color_ranges = [[[230, 235, 235], [255, 255, 249]]]
#background_color_ranges = [[[80, 66, 50], [220, 215, 200]]]
allowed_chars = "0123456789.%+"
post_upscale = [128, 512]

[echoes.fullStatsValue.signature]
#spec_version = "3.3-new-ui-v2-stats-v2"
cache_mode = "persistent"
color_space = "bgr"
#pre_downscale = [64, 128]
text_color_ranges = [
    [[255, 255, 249], [255, 255, 249]],
]

[echoes.level.ocr]
render_mode = "normalized_anchor_contrast"
#render_mode = "anchor_contrast"
anchor_contrast_sharpness = 12.0
color_space = "bgr"
#text_anchor =
text_color_ranges = [[[170, 160, 150], [195, 190, 175]]]
background_color_ranges = [[[40, 30, 20], [60, 50, 40]]]
#text_color_ranges = [[[150, 160, 170], [175, 190, 195]]]
#background_color_ranges = [[[20, 30, 40], [40, 50, 60]]]
single_line = true
post_upscale = [64, 64]

allowed_chars = "0123456789+"

[echoes.level.signature]
#spec_version = "3.3-new-ui-v2-level-v2"
cache_mode = "transient"
color_space = "bgr"
# Signature colors are keyed against the shared BGR-normalized level crop
# used by both live capture and raw-session reprocess.
#pre_downscale = [32, 32]
single_line = true
text_color_ranges = [
#    [[197, 185, 173], [197, 185, 173]],
#    [[189, 185, 169], [217, 205, 193]],
    [[180, 180, 170], [194, 196, 190]],
]

[echoes.equipped.ocr]
single_line = true
color_space = "hsv"
render_mode = "masked_normalized_anchor_contrast"
text_color_ranges = [[[25,70,200],[27,90,255]]]

[echoes.equipped.signature]
single_line = true
color_space = "hsv"
text_color_ranges = [[[25,70,200],[27,90,255]]]


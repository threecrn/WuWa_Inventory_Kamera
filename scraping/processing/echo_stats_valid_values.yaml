# echo_stats_valid_values.yaml
# ============================================================
# Pre-computed valid value space for rarity-5 echo stats.
#
# Sources / formulas (see validation.md for detail):
#   main_stat_at_level = v_min + (level / 25) * (v_max - v_min)
#   All percentage values rounded to 1 decimal place.
#   All flat values rounded to the nearest integer.
#
# Stat name convention
# --------------------
#   Names match the canonical keys produced by _extractStats in
#   echoesProcessor.py:  echoStats[ocr_token] + optional "%"
#   e.g.  "critrate" → echoStats → "cr"  + "%" → "cr%"
#         "hp"       → echoStats → "hp"  (no %) → "hp"
#
# Index convention for main-stat value lists
# ------------------------------------------
#   List index = echo level  (index 0 → level 0, index 25 → level 25)
#   26 entries total per stat per cost.
# ============================================================

